name: CI

on:
  push:
  pull_request:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  SOLUTION_FILE: 'Backend_BrightSwagShop.sln'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}
      
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore
      
    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_FILE }} --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Install API test dependencies
      run: npm ci
      working-directory: APITests

    - name: Run Playwright API tests
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ASPNETCORE_URLS: http://127.0.0.1:5076
        API_BASE_URL: http://127.0.0.1:5076
        QASE_REPORT: "1"
        QASE_MODE: testops
        QASE_TESTOPS_API_TOKEN: ${{ secrets['QASE_TESTOPS_API_TOKEN'] }}
        QASE_TESTOPS_PROJECT: ${{ secrets['QASE_TESTOPS_PROJECT'] }}
        QASE_API_TOKEN: ${{ secrets['QASE_TESTOPS_API_TOKEN'] }}
        QASE_PROJECT_CODE: ${{ secrets['QASE_TESTOPS_PROJECT'] }}
      run: |
        dotnet run --project ../FakeWebShop.Api --no-build > api.log 2>&1 &
        for i in {1..30}; do
          if curl -sSf "$API_BASE_URL/api/products" > /dev/null; then
            echo "API is up"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "API failed to start"
            cat api.log
            exit 1
          fi
          sleep 2
        done
        npm test
      working-directory: APITests

    - name: Run Cucumber API tests
      env:
        API_BASE_URL: http://127.0.0.1:5076
        QASE_MODE: testops
        QASE_TESTOPS_API_TOKEN: ${{ secrets['QASE_TESTOPS_API_TOKEN'] }}
        QASE_TESTOPS_PROJECT: ${{ secrets['QASE_TESTOPS_PROJECT'] }}
      run: npm run test:cucumber:qase
      working-directory: APITests
      
    - name: Check for vulnerabilities
      run: dotnet list package --vulnerable --include-transitive
      continue-on-error: true
  
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
        
    steps:
    - name: Trigger Render deployment
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      
    - name: Deployment initiated
      run: echo "Deployment to Render has been triggered successfully"