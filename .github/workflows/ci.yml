name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      upload_report:
        description: Upload Allure report artifact
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      send_email:
        description: Send Allure report email (requires SENDGRID_API_KEY)
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  SOLUTION_FILE: 'Backend_BrightSwagShop.sln'
  ASPNETCORE_ENVIRONMENT: Production

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}
      
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore
      
    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_FILE }} --configuration Release --no-build --verbosity normal
      
    - name: Install API test dependencies
      working-directory: APITests
      run: |
        # Public dependency repo: ensure any SSH-style GitHub URLs resolve via HTTPS.
        git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
        git config --global --add url."https://github.com/".insteadOf "git@github.com:"

        echo "Git URL rewrite rules:"
        git config --global --get-regexp '^url\..*\.insteadof' || true

        npm ci

    - name: Start API for integration tests
      env:
        Mongo__ConnectionString: ${{ secrets.MONGO_PROD_CONNECTION_STRING }}
        Mongo__Database: BrightSwagShop
        Supabase__Url: ${{ secrets.SUPABASE_URL }}
        Supabase__AnonKey: ${{ secrets.SUPABASE_ANON_KEY }}
        Supabase__ServiceRoleKey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        Stripe__SecretKey: ${{ secrets.STRIPE_SECRET_KEY }}
        Stripe__WebhookSecret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        Jwt__Key: ${{ secrets.JWT_KEY }}
        Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
        Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}
        AzureAd__TenantId: ${{ secrets.AZURE_AD_TENANT_ID }}
        AzureAd__ClientId: ${{ secrets.AZURE_AD_CLIENT_ID }}
        AzureAd__Audience: ${{ secrets.AZURE_AD_AUDIENCE }}
      run: |
        dotnet run --project FakeWebShop.Api/FakeWebShop.Api.csproj --launch-profile http > api.log 2>&1 &
        echo $! > api.pid

    - name: Wait for API readiness
      run: |
        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:5076/api/categories > /dev/null; then
            echo "API is up"
            exit 0
          fi
          echo "Waiting for API... ($i/30)"
          sleep 2
        done
        echo "API failed to start"
        cat api.log || true
        exit 1

    - name: Run Newman positive API tests
      id: newman_positive_tests
      continue-on-error: true
      working-directory: APITests
      env:
        API_BASE_URL: http://127.0.0.1:5076
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        JWT_KEY: ${{ secrets.JWT_KEY }}
        ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      run: |
        # Ensure test-results exists
        mkdir -p test-results
        npm run test:newman:positive

    - name: Upload Newman positive results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: newman-positive-results
        path: APITests/test-results/newman-positive-results.xml
        retention-days: 14

    - name: Run Newman negative API tests
      id: newman_negative_tests
      continue-on-error: true
      working-directory: APITests
      env:
        API_BASE_URL: http://127.0.0.1:5076
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        JWT_KEY: ${{ secrets.JWT_KEY }}
        ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      run: |
        # Ensure test-results exists
        mkdir -p test-results
        npm run test:newman:negative

    - name: Upload Newman negative results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: newman-negative-results
        path: APITests/test-results/newman-negative-results.xml
        retention-days: 14

    - name: Run Cucumber API tests
      id: cucumber_tests
      continue-on-error: true
      env:
        API_BASE_URL: http://127.0.0.1:5076
        TESTRAIL_BASE_URL: ${{ secrets.TESTRAIL_BASE_URL }}
        TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
        TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
        TESTRAIL_PROJECT_NAME: BrightSwagShop
        TESTRAIL_BUILD_NAME: 'Build #${{ github.run_number }}'
      run: npx @cucumber/cucumber --profile testrail
      working-directory: APITests

    - name: Setup Python for TestRail CLI
      if: always()
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Upload to TestRail via CLI
      if: always()
      working-directory: APITests
      run: |
        pip install trcli
        trcli -y \
          -h "${{ secrets.TESTRAIL_BASE_URL }}" \
          --project "BrightSwagShop" \
          -u "${{ secrets.TESTRAIL_USERNAME }}" \
          -p "${{ secrets.TESTRAIL_API_KEY }}" \
          parse_junit \
          --title "Automated API Tests - Build #${{ github.run_number }}" \
          --run-description "Triggered by: ${{ github.actor }} | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -f "test-results/junit.xml"

    - name: Generate Allure report
      if: always() && github.event_name == 'workflow_dispatch' && (inputs.upload_report == 'true' || inputs.send_email == 'true')
      run: npm run report:allure:generate
      working-directory: APITests

    - name: Archive Allure report
      if: always() && github.event_name == 'workflow_dispatch' && inputs.upload_report == 'true' && hashFiles('APITests/allure-report/index.html') != ''
      run: |
        cd APITests
        zip -r allure-report.zip allure-report

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      if: always() && github.event_name == 'workflow_dispatch' && inputs.upload_report == 'true'
      continue-on-error: true
      with:
        name: backend-allure-report
        path: APITests/allure-report.zip
        retention-days: 30

    - name: Send Allure Report via Email (SendGrid API)
      if: always() && github.event_name == 'workflow_dispatch' && inputs.send_email == 'true'
      run: |
        if [ -z "${{ secrets.SENDGRID_API_KEY }}" ]; then
          echo "SENDGRID_API_KEY not configured, skipping email"
          exit 0
        fi

        if [ ! -f APITests/allure-report/index.html ]; then
          echo "Allure report not found, skipping email"
          exit 0
        fi

        cat > email_payload.json << 'EOF'
        {
          "personalizations": [{
            "to": [{"email": "boonenwout@gmail.com"}]
          }],
          "from": {"email": "wout.boonen@brightest.be", "name": "GitHub Actions"},
          "subject": "Backend Allure Report - REPO [BRANCH]",
          "content": [{
            "type": "text/html",
            "value": "HTML_CONTENT"
          }]
        }
        EOF

        sed -i "s|REPO|${{ github.repository }}|g" email_payload.json
        sed -i "s|BRANCH|${{ github.ref_name }}|g" email_payload.json
        sed -i "s|HTML_CONTENT|<h2>Backend Allure Test Report</h2><p><strong>Repository:</strong> ${{ github.repository }}</p><p><strong>Branch:</strong> ${{ github.ref_name }}</p><p><strong>Commit:</strong> ${{ github.sha }}</p><p><strong>Triggered by:</strong> ${{ github.actor }}</p><p><strong>Workflow:</strong> ${{ github.workflow }}</p><p><strong>Run ID:</strong> ${{ github.run_id }}</p><hr><p><strong>View the full HTML report in GitHub Actions artifacts:</strong></p><p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' style='display:inline-block;padding:10px 20px;background-color:#F4C709;color:#3C3C3B;text-decoration:none;border-radius:5px;font-weight:bold;'>Download Allure Report</a></p><p>Click the link above, scroll to the Artifacts section, and download the <code>backend-allure-report</code> artifact.</p>|g" email_payload.json

        HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.sendgrid.com/v3/mail/send \
          -H "Authorization: Bearer ${{ secrets.SENDGRID_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @email_payload.json)

        HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$HTTP_RESPONSE" | head -n-1)

        echo "HTTP Status Code: $HTTP_CODE"
        echo "Response: $RESPONSE_BODY"

        if [ "$HTTP_CODE" -eq 202 ]; then
          echo "Email sent successfully to boonenwout@gmail.com!"
        else
          echo "Failed to send email"
          echo "Response body: $RESPONSE_BODY"
          exit 1
        fi
      continue-on-error: true

    - name: Fail pipeline if Cucumber tests failed
      if: always() && steps.cucumber_tests.outcome == 'failure'
      run: |
        echo "Cucumber API tests failed. See Allure artifact/email for details."
        exit 1
      
    - name: Check for vulnerabilities
      run: dotnet list package --vulnerable --include-transitive
      continue-on-error: true

    - name: Trigger cross-repo E2E workflow
      id: trigger_e2e
      env:
        CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
      if: github.event_name == 'push' && env.CROSS_REPO_PAT != ''
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ env.CROSS_REPO_PAT }}
        repository: BrightSwagShop/TestingFramework
        event-type: run-cross-e2e
        client-payload: '{"source_repository":"${{ github.repository }}","source_workflow":"${{ github.workflow }}","source_run_id":"${{ github.run_id }}","sha":"${{ github.sha }}","ref":"${{ github.ref }}","frontend_ref":"frontend-framework-integration","status_context":"cross-repo-e2e/${{ github.run_id }}"}'

    - name: Wait for E2E workflow to complete
      if: github.event_name == 'push' && steps.trigger_e2e.outcome == 'success'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const maxAttempts = 120; // ~10 minutes (120 * 5s)
          const sleepMs = 5000;
          const sourceSha = '${{ github.sha }}';
          const sourceRunId = '${{ github.run_id }}';
          const statusContext = `cross-repo-e2e/${{ github.run_id }}`;

          let attempts = 0;
          let concluded = false;

          while (attempts < maxAttempts && !concluded) {
            // Check commit statuses on this repo first
            const statuses = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sourceSha,
            });

            const matchingStatus = statuses.data.find(s => s.context === statusContext);

            if (matchingStatus) {
              console.log(`Found cross-repo status: ${matchingStatus.state} (${matchingStatus.target_url || 'no-url'})`);
              if (matchingStatus.state === 'success') {
                console.log('E2E workflow completed successfully via commit status.');
                concluded = true;
                break;
              }
              if (matchingStatus.state === 'failure' || matchingStatus.state === 'error') {
                throw new Error('E2E workflow reported failure via commit status. Blocking deployment.');
              }
            } else {
              console.log(`No commit status yet for context ${statusContext} (attempt ${attempts + 1}/${maxAttempts}).`);
            }

            // Fallback: query TestingFramework workflow runs by source run id.
            // The TestingFramework run-name includes the backend run id, but its head_sha
            // is the TestingFramework repo commit, not the backend commit.
            try {
              const [owner, repo] = 'BrightSwagShop/TestingFramework'.split('/');
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 20,
                event: 'repository_dispatch',
              });

              const matchingRun = (runs.data.workflow_runs || []).find(run => {
                const title = `${run.display_title || ''} ${run.name || ''}`;
                return title.includes(`source run ${sourceRunId}`) || title.includes(sourceRunId);
              });

              if (matchingRun) {
                console.log(`Found TF run: id=${matchingRun.id} conclusion=${matchingRun.conclusion} status=${matchingRun.status} url=${matchingRun.html_url}`);
                if (matchingRun.status === 'completed') {
                  if (matchingRun.conclusion === 'success') {
                    console.log('E2E workflow completed successfully (fallback run).');
                    concluded = true;
                    break;
                  }

                  throw new Error(`E2E workflow run concluded with ${matchingRun.conclusion}. Blocking deployment.`);
                }

                console.log(`Matched TF run is still ${matchingRun.status}; waiting.`);
              } else {
                console.log(`No TestingFramework workflow runs found yet for source run ${sourceRunId}.`);
              }
            } catch (err) {
              console.log('Error checking TestingFramework runs fallback:', String(err));
            }

            if (!concluded) {
              await new Promise(resolve => setTimeout(resolve, sleepMs));
              attempts++;
            }
          }

          if (!concluded) {
            throw new Error('E2E workflow did not complete in time or had unknown status; blocking deployment.');
          }
  
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: success()
        
    steps:
    - name: Trigger Render deployment
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      
    - name: Deployment initiated
      run: echo "Deployment to Render has been triggered successfully"