name: Retarget Open PRs to Development

on:
  push:
    branches:
      - 'copilot/move-branches-to-development'
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  retarget-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Retarget open feature/* and fix/* PRs from main to Development
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Looking for open PRs targeting 'main' with feature/* or fix/* heads..."

          prs=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --base main \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | test("^(feature|fix)/")) | [.number, .headRefName] | @tsv')

          if [[ -z "$prs" ]]; then
            echo "No PRs found that need retargeting. All feature/fix PRs already target Development."
            exit 0
          fi

          failed=()
          while IFS=$'\t' read -r pr_number head_ref; do
            echo "Retargeting PR #${pr_number} (${head_ref}) → Development"
            if gh pr edit "${pr_number}" --repo "$REPO" --base Development; then
              echo "  Done."
            else
              echo "  Failed to retarget PR #${pr_number}."
              failed+=("${pr_number}")
            fi
          done <<< "$prs"

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "::error::Failed to retarget the following PRs: ${failed[*]}"
            exit 1
          fi

          echo "All eligible PRs have been retargeted to Development."
