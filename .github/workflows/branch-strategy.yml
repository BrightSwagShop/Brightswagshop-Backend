name: Branch Strategy Enforcement

on:
  pull_request:
    branches: [ main, development ]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Enforce branching strategy
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "PR from '${HEAD}' into '${BASE}'"

          # feature/* and fix/* branches must target 'development', not 'main'
          if [[ "$BASE" == "main" ]] && [[ "$HEAD" == feature/* || "$HEAD" == fix/* ]]; then
            echo "::error::Feature and fix branches must target the 'development' branch, not 'main'."
            exit 1
          fi

          # Only 'development' (or release/* / hotfix/*) should merge into 'main'
          if [[ "$BASE" == "main" ]] && ! [[ "$HEAD" =~ ^(development|release/.*|hotfix/.*)$ ]]; then
            echo "::error::Only the 'development' branch (or release/* / hotfix/* branches) may be merged directly into 'main'."
            exit 1
          fi

          echo "Branch strategy check passed."
